  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script type="text/babel">

// animations.jsx
// Reusable animation starter: Stage, Timeline, Sprite, easing helpers.
// Usage (in an HTML file that loads React + Babel):
//
//   <Stage width={1280} height={720} duration={10} background="#f6f4ef">
//     <MyScene />
//   </Stage>
//
// Inside <Stage>, any child can call useTime() to read the current
// playhead (seconds). Or wrap content in <Sprite start={1} end={4}>...</Sprite>
// to only render during that window -- children receive a `localTime` and
// `progress` via the useSprite() hook.
//
// ─────────────────────────────────────────────────────────────────────────────

// ── Easing functions (hand-rolled, Popmotion-style) ─────────────────────────
// All easings take t ∈ [0,1] and return eased t ∈ [0,1] (may overshoot for back/elastic).
const Easing = {
  linear: (t) => t,

  // Quad
  easeInQuad:    (t) => t * t,
  easeOutQuad:   (t) => t * (2 - t),
  easeInOutQuad: (t) => (t < 0.5 ? 2 * t * t : -1 + (4 - 2 * t) * t),

  // Cubic
  easeInCubic:    (t) => t * t * t,
  easeOutCubic:   (t) => (--t) * t * t + 1,
  easeInOutCubic: (t) => (t < 0.5 ? 4 * t * t * t : (t - 1) * (2 * t - 2) * (2 * t - 2) + 1),

  // Quart
  easeInQuart:    (t) => t * t * t * t,
  easeOutQuart:   (t) => 1 - (--t) * t * t * t,
  easeInOutQuart: (t) => (t < 0.5 ? 8 * t * t * t * t : 1 - 8 * (--t) * t * t * t),

  // Expo
  easeInExpo:  (t) => (t === 0 ? 0 : Math.pow(2, 10 * (t - 1))),
  easeOutExpo: (t) => (t === 1 ? 1 : 1 - Math.pow(2, -10 * t)),
  easeInOutExpo: (t) => {
    if (t === 0) return 0;
    if (t === 1) return 1;
    if (t < 0.5) return 0.5 * Math.pow(2, 20 * t - 10);
    return 1 - 0.5 * Math.pow(2, -20 * t + 10);
  },

  // Sine
  easeInSine:    (t) => 1 - Math.cos((t * Math.PI) / 2),
  easeOutSine:   (t) => Math.sin((t * Math.PI) / 2),
  easeInOutSine: (t) => -(Math.cos(Math.PI * t) - 1) / 2,

  // Back (overshoot)
  easeOutBack: (t) => {
    const c1 = 1.70158, c3 = c1 + 1;
    return 1 + c3 * Math.pow(t - 1, 3) + c1 * Math.pow(t - 1, 2);
  },
  easeInBack: (t) => {
    const c1 = 1.70158, c3 = c1 + 1;
    return c3 * t * t * t - c1 * t * t;
  },
  easeInOutBack: (t) => {
    const c1 = 1.70158, c2 = c1 * 1.525;
    return t < 0.5
      ? (Math.pow(2 * t, 2) * ((c2 + 1) * 2 * t - c2)) / 2
      : (Math.pow(2 * t - 2, 2) * ((c2 + 1) * (t * 2 - 2) + c2) + 2) / 2;
  },

  // Elastic
  easeOutElastic: (t) => {
    const c4 = (2 * Math.PI) / 3;
    if (t === 0) return 0;
    if (t === 1) return 1;
    return Math.pow(2, -10 * t) * Math.sin((t * 10 - 0.75) * c4) + 1;
  },
};

// ── Core interpolation helpers ──────────────────────────────────────────────

// Clamp a value to [min, max]
const clamp = (v, min, max) => Math.max(min, Math.min(max, v));

// interpolate([0, 0.5, 1], [0, 100, 50], ease?) -> fn(t)
// Popmotion-style: linearly maps t across input keyframes to output values,
// with optional easing per segment (single fn or array of fns).
function interpolate(input, output, ease = Easing.linear) {
  return (t) => {
    if (t <= input[0]) return output[0];
    if (t >= input[input.length - 1]) return output[output.length - 1];
    for (let i = 0; i < input.length - 1; i++) {
      if (t >= input[i] && t <= input[i + 1]) {
        const span = input[i + 1] - input[i];
        const local = span === 0 ? 0 : (t - input[i]) / span;
        const easeFn = Array.isArray(ease) ? (ease[i] || Easing.linear) : ease;
        const eased = easeFn(local);
        return output[i] + (output[i + 1] - output[i]) * eased;
      }
    }
    return output[output.length - 1];
  };
}

// animate({from, to, start, end, ease})(t) — simpler single-segment tween.
// Returns `from` before `start`, `to` after `end`.
function animate({ from = 0, to = 1, start = 0, end = 1, ease = Easing.easeInOutCubic }) {
  return (t) => {
    if (t <= start) return from;
    if (t >= end) return to;
    const local = (t - start) / (end - start);
    return from + (to - from) * ease(local);
  };
}

// ── Timeline context ────────────────────────────────────────────────────────

const TimelineContext = React.createContext({ time: 0, duration: 10, playing: false });

const useTime = () => React.useContext(TimelineContext).time;
const useTimeline = () => React.useContext(TimelineContext);

// ── Sprite ──────────────────────────────────────────────────────────────────
// Renders children only when the playhead is inside [start, end]. Provides
// a sub-context with `localTime` (seconds since start) and `progress` (0..1).
//
//   <Sprite start={2} end={5}>
//     {({ localTime, progress }) => <Thing x={progress * 100} />}
//   </Sprite>
//
// Or as a plain wrapper — children can call useSprite() themselves.

const SpriteContext = React.createContext({ localTime: 0, progress: 0, duration: 0 });
const useSprite = () => React.useContext(SpriteContext);

function Sprite({ start = 0, end = Infinity, children, keepMounted = false }) {
  const { time } = useTimeline();
  const visible = time >= start && time <= end;
  if (!visible && !keepMounted) return null;

  const duration = end - start;
  const localTime = Math.max(0, time - start);
  const progress = duration > 0 && isFinite(duration)
    ? clamp(localTime / duration, 0, 1)
    : 0;

  const value = { localTime, progress, duration, visible };

  return (
    <SpriteContext.Provider value={value}>
      {typeof children === 'function' ? children(value) : children}
    </SpriteContext.Provider>
  );
}

// ── Sample sprite components ────────────────────────────────────────────────

// TextSprite: fades/slides text in on entry, holds, then fades out on exit.
// Props: text, x, y, size, color, font, entryDur, exitDur, align
function TextSprite({
  text,
  x = 0, y = 0,
  size = 48,
  color = '#111',
  font = 'Inter, system-ui, sans-serif',
  weight = 600,
  entryDur = 0.45,
  exitDur = 0.35,
  entryEase = Easing.easeOutBack,
  exitEase = Easing.easeInCubic,
  align = 'left',
  letterSpacing = '-0.01em',
}) {
  const { localTime, duration } = useSprite();
  const exitStart = Math.max(0, duration - exitDur);

  let opacity = 1;
  let ty = 0;

  if (localTime < entryDur) {
    const t = entryEase(clamp(localTime / entryDur, 0, 1));
    opacity = t;
    ty = (1 - t) * 16;
  } else if (localTime > exitStart) {
    const t = exitEase(clamp((localTime - exitStart) / exitDur, 0, 1));
    opacity = 1 - t;
    ty = -t * 8;
  }

  const translateX = align === 'center' ? '-50%' : align === 'right' ? '-100%' : '0';

  return (
    <div style={{
      position: 'absolute',
      left: x, top: y,
      transform: `translate(${translateX}, ${ty}px)`,
      opacity,
      fontFamily: font,
      fontSize: size,
      fontWeight: weight,
      color,
      letterSpacing,
      whiteSpace: 'pre',
      lineHeight: 1.1,
      willChange: 'transform, opacity',
    }}>
      {text}
    </div>
  );
}

// ImageSprite: scales + fades in; optional Ken Burns drift during hold.
function ImageSprite({
  src,
  x = 0, y = 0,
  width = 400, height = 300,
  entryDur = 0.6,
  exitDur = 0.4,
  kenBurns = false,
  kenBurnsScale = 1.08,
  radius = 12,
  fit = 'cover',
  placeholder = null, // {label: string} for striped placeholder
}) {
  const { localTime, duration } = useSprite();
  const exitStart = Math.max(0, duration - exitDur);

  let opacity = 1;
  let scale = 1;

  if (localTime < entryDur) {
    const t = Easing.easeOutCubic(clamp(localTime / entryDur, 0, 1));
    opacity = t;
    scale = 0.96 + 0.04 * t;
  } else if (localTime > exitStart) {
    const t = Easing.easeInCubic(clamp((localTime - exitStart) / exitDur, 0, 1));
    opacity = 1 - t;
    scale = (kenBurns ? kenBurnsScale : 1) + 0.02 * t;
  } else if (kenBurns) {
    const holdSpan = exitStart - entryDur;
    const holdT = holdSpan > 0 ? (localTime - entryDur) / holdSpan : 0;
    scale = 1 + (kenBurnsScale - 1) * holdT;
  }

  const content = placeholder ? (
    <div style={{
      width: '100%', height: '100%',
      display: 'flex', alignItems: 'center', justifyContent: 'center',
      background: 'repeating-linear-gradient(135deg, #e9e6df 0 10px, #dcd8cf 10px 20px)',
      color: '#6b6458',
      fontFamily: 'JetBrains Mono, ui-monospace, monospace',
      fontSize: 13,
      letterSpacing: '0.04em',
      textTransform: 'uppercase',
    }}>
      {placeholder.label || 'image'}
    </div>
  ) : (
    <img src={src} alt="" style={{ width: '100%', height: '100%', objectFit: fit, display: 'block' }} />
  );

  return (
    <div style={{
      position: 'absolute',
      left: x, top: y,
      width, height,
      opacity,
      transform: `scale(${scale})`,
      transformOrigin: 'center',
      borderRadius: radius,
      overflow: 'hidden',
      willChange: 'transform, opacity',
    }}>
      {content}
    </div>
  );
}

// RectSprite: simple rectangle that animates position/size/color via props.
// Useful demo primitive — takes a `render` fn for per-frame customization.
function RectSprite({
  x = 0, y = 0,
  width = 100, height = 100,
  color = '#111',
  radius = 8,
  entryDur = 0.4,
  exitDur = 0.3,
  render, // optional: (ctx) => style overrides
}) {
  const spriteCtx = useSprite();
  const { localTime, duration } = spriteCtx;
  const exitStart = Math.max(0, duration - exitDur);

  let opacity = 1;
  let scale = 1;

  if (localTime < entryDur) {
    const t = Easing.easeOutBack(clamp(localTime / entryDur, 0, 1));
    opacity = clamp(localTime / entryDur, 0, 1);
    scale = 0.4 + 0.6 * t;
  } else if (localTime > exitStart) {
    const t = Easing.easeInQuad(clamp((localTime - exitStart) / exitDur, 0, 1));
    opacity = 1 - t;
    scale = 1 - 0.15 * t;
  }

  const overrides = render ? render(spriteCtx) : {};

  return (
    <div style={{
      position: 'absolute',
      left: x, top: y,
      width, height,
      background: color,
      borderRadius: radius,
      opacity,
      transform: `scale(${scale})`,
      transformOrigin: 'center',
      willChange: 'transform, opacity',
      ...overrides,
    }} />
  );
}


function Stage({
  width = 1280,
  height = 720,
  duration = 10,
  background = '#f6f4ef',
  fps = 60,
  loop = true,
  autoplay = true,
  persistKey = 'animstage',
  children,
}) {
  const [time, setTime] = React.useState(() => {
    try {
      const v = parseFloat(localStorage.getItem(persistKey + ':t') || '0');
      return isFinite(v) ? clamp(v, 0, duration) : 0;
    } catch { return 0; }
  });
  const [playing, setPlaying] = React.useState(autoplay);
  const [hoverTime, setHoverTime] = React.useState(null);
  const [scale, setScale] = React.useState(1);

  const stageRef = React.useRef(null);
  const canvasRef = React.useRef(null);
  const rafRef = React.useRef(null);
  const lastTsRef = React.useRef(null);

  // Persist playhead
  React.useEffect(() => {
    try { localStorage.setItem(persistKey + ':t', String(time)); } catch {}
  }, [time, persistKey]);

  // Auto-scale to fit viewport
  React.useEffect(() => {
    if (!stageRef.current) return;
    const el = stageRef.current;
    const measure = () => {
      const s = Math.min(
        el.clientWidth / width,
        el.clientHeight / height
      );
      setScale(Math.max(0.05, s));
    };
    measure();
    const ro = new ResizeObserver(measure);
    ro.observe(el);
    window.addEventListener('resize', measure);
    return () => {
      ro.disconnect();
      window.removeEventListener('resize', measure);
    };
  }, [width, height]);

  // Animation loop
  React.useEffect(() => {
    if (!playing) {
      lastTsRef.current = null;
      return;
    }
    const step = (ts) => {
      if (lastTsRef.current == null) lastTsRef.current = ts;
      const dt = (ts - lastTsRef.current) / 1000;
      lastTsRef.current = ts;
      setTime((t) => {
        let next = t + dt;
        if (next >= duration) {
          if (loop) next = next % duration;
          else { next = duration; setPlaying(false); }
        }
        return next;
      });
      rafRef.current = requestAnimationFrame(step);
    };
    rafRef.current = requestAnimationFrame(step);
    return () => {
      if (rafRef.current) cancelAnimationFrame(rafRef.current);
      lastTsRef.current = null;
    };
  }, [playing, duration, loop]);

  // Keyboard: space = play/pause, ← → = seek
  React.useEffect(() => {
    const onKey = (e) => {
      if (e.target && (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA')) return;
      if (e.code === 'Space') {
        e.preventDefault();
        setPlaying(p => !p);
      } else if (e.code === 'ArrowLeft') {
        setTime(t => clamp(t - (e.shiftKey ? 1 : 0.1), 0, duration));
      } else if (e.code === 'ArrowRight') {
        setTime(t => clamp(t + (e.shiftKey ? 1 : 0.1), 0, duration));
      } else if (e.key === '0' || e.code === 'Home') {
        setTime(0);
      }
    };
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
  }, [duration]);

  const displayTime = hoverTime != null ? hoverTime : time;

  const ctxValue = React.useMemo(
    () => ({ time: displayTime, duration, playing, setTime, setPlaying }),
    [displayTime, duration, playing]
  );

  return (
    <div
      ref={stageRef}
      style={{
        position: 'absolute', inset: 0,
        display: 'flex', flexDirection: 'column',
        alignItems: 'center',
        background: 'transparent',
        fontFamily: 'Inter, system-ui, sans-serif',
      }}
    >
      {/* Canvas area — vertically centered in remaining space */}
      <div style={{
        flex: 1,
        width: '100%',
        display: 'flex', alignItems: 'center', justifyContent: 'center',
        overflow: 'hidden',
        minHeight: 0,
      }}>
        <div
          ref={canvasRef}
          style={{
            width, height,
            background,
            position: 'relative',
            transform: `scale(${scale})`,
            transformOrigin: 'center',
            flexShrink: 0,
            overflow: 'hidden',
          }}
        >
          <TimelineContext.Provider value={ctxValue}>
            {children}
          </TimelineContext.Provider>
        </div>
      </div>

      {/* PlaybackBar hidden — autoplay loop only */}
    </div>
  );
}

// ── Playback bar ────────────────────────────────────────────────────────────
// Play/pause, return-to-begin, scrub track, time display.
// Uses fixed-width time fields so layout doesn't thrash.

function PlaybackBar({ time, duration, playing, onPlayPause, onReset, onSeek, onHover }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);

  const timeFromEvent = React.useCallback((e) => {
    const rect = trackRef.current.getBoundingClientRect();
    const x = clamp((e.clientX - rect.left) / rect.width, 0, 1);
    return x * duration;
  }, [duration]);

  const onTrackMove = (e) => {
    if (!trackRef.current) return;
    const t = timeFromEvent(e);
    if (dragging) {
      onSeek(t);
    } else {
      onHover(t);
    }
  };

  const onTrackLeave = () => {
    if (!dragging) onHover(null);
  };

  const onTrackDown = (e) => {
    setDragging(true);
    const t = timeFromEvent(e);
    onSeek(t);
    onHover(null);
  };

  React.useEffect(() => {
    if (!dragging) return;
    const onUp = () => setDragging(false);
    const onMove = (e) => {
      if (!trackRef.current) return;
      const t = timeFromEvent(e);
      onSeek(t);
    };
    window.addEventListener('mouseup', onUp);
    window.addEventListener('mousemove', onMove);
    return () => {
      window.removeEventListener('mouseup', onUp);
      window.removeEventListener('mousemove', onMove);
    };
  }, [dragging, timeFromEvent, onSeek]);

  const pct = duration > 0 ? (time / duration) * 100 : 0;
  const fmt = (t) => {
    const total = Math.max(0, t);
    const m = Math.floor(total / 60);
    const s = Math.floor(total % 60);
    const cs = Math.floor((total * 100) % 100);
    return `${String(m).padStart(1, '0')}:${String(s).padStart(2, '0')}.${String(cs).padStart(2, '0')}`;
  };

  const mono = 'JetBrains Mono, ui-monospace, SFMono-Regular, monospace';

  return (
    <div style={{
      display: 'flex', alignItems: 'center', gap: 12,
      padding: '8px 16px',
      background: 'rgba(20,20,20,0.92)',
      borderTop: '1px solid rgba(255,255,255,0.08)',
      width: '100%',
      maxWidth: 680,
      alignSelf: 'center',

      borderRadius: 8,
      color: '#f6f4ef',
      fontFamily: 'Inter, system-ui, sans-serif',
      userSelect: 'none',
      flexShrink: 0,
    }}>
      <IconButton onClick={onReset} title="Return to start (0)">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
          <path d="M3 2v10M12 2L5 7l7 5V2z" stroke="currentColor" strokeWidth="1.5" strokeLinejoin="round" strokeLinecap="round"/>
        </svg>
      </IconButton>
      <IconButton onClick={onPlayPause} title="Play/pause (space)">
        {playing ? (
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
            <rect x="3" y="2" width="3" height="10" fill="currentColor"/>
            <rect x="8" y="2" width="3" height="10" fill="currentColor"/>
          </svg>
        ) : (
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
            <path d="M3 2l9 5-9 5V2z" fill="currentColor"/>
          </svg>
        )}
      </IconButton>

      {/* Current time: fixed width so it doesn't thrash */}
      <div style={{
        fontFamily: mono,
        fontSize: 12,
        fontVariantNumeric: 'tabular-nums',
        width: 64, textAlign: 'right',
        color: '#f6f4ef',
      }}>
        {fmt(time)}
      </div>

      {/* Scrub track */}
      <div
        ref={trackRef}
        onMouseMove={onTrackMove}
        onMouseLeave={onTrackLeave}
        onMouseDown={onTrackDown}
        style={{
          flex: 1,
          height: 22,
          position: 'relative',
          cursor: 'pointer',
          display: 'flex', alignItems: 'center',
        }}
      >
        <div style={{
          position: 'absolute',
          left: 0, right: 0, height: 4,
          background: 'rgba(255,255,255,0.12)',
          borderRadius: 2,
        }}/>
        <div style={{
          position: 'absolute',
          left: 0, width: `${pct}%`, height: 4,
          background: 'oklch(72% 0.12 250)',
          borderRadius: 2,
        }}/>
        <div style={{
          position: 'absolute',
          left: `${pct}%`, top: '50%',
          width: 12, height: 12,
          marginLeft: -6, marginTop: -6,
          background: '#fff',
          borderRadius: 6,
          boxShadow: '0 2px 4px rgba(0,0,0,0.4)',
        }}/>
      </div>

      {/* Duration: fixed width */}
      <div style={{
        fontFamily: mono,
        fontSize: 12,
        fontVariantNumeric: 'tabular-nums',
        width: 64, textAlign: 'left',
        color: 'rgba(246,244,239,0.55)',
      }}>
        {fmt(duration)}
      </div>
    </div>
  );
}

function IconButton({ children, onClick, title }) {
  const [hover, setHover] = React.useState(false);
  return (
    <button
      onClick={onClick}
      title={title}
      onMouseEnter={() => setHover(true)}
      onMouseLeave={() => setHover(false)}
      style={{
        width: 28, height: 28,
        display: 'flex', alignItems: 'center', justifyContent: 'center',
        background: hover ? 'rgba(255,255,255,0.12)' : 'rgba(255,255,255,0.04)',
        border: '1px solid rgba(255,255,255,0.1)',
        borderRadius: 6,
        color: '#f6f4ef',
        cursor: 'pointer',
        padding: 0,
        transition: 'background 120ms',
      }}
    >
      {children}
    </button>
  );
}


Object.assign(window, {
  Easing, interpolate, animate, clamp,
  TimelineContext, useTime, useTimeline,
  Sprite, SpriteContext, useSprite,
  TextSprite, ImageSprite, RectSprite,
  Stage, PlaybackBar,
});


  </script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #070e1c; margin: 0; padding: 0; }
    #root { position: absolute; inset: 0; }
  </style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { Stage, Sprite, useTime, useSprite, animate, interpolate, Easing, clamp } = window;

// ─── COLORS ──────────────────────────────────────────────────────────────────
const C = {
  bg:        '#070e1c',
  bgMid:     '#0b1628',
  blue:      '#1a6fdb',
  blueLight: '#4a9fff',
  bluePale:  '#a8cfff',
  white:     '#f0f4ff',
  gray:      '#8ba0bd',
  grayDark:  '#3a4d63',
  green:     '#22c55e',
  greenDark: '#16a34a',

// ─── HELPERS ──────────────────────────────────────────────────────────────────
function fadeIn(localTime, dur = 0.4) {
  return clamp(localTime / dur, 0, 1);
}
function fadeOut(localTime, spriteDur, dur = 0.4) {
  const exitStart = spriteDur - dur;
  if (localTime < exitStart) return 1;
  return 1 - clamp((localTime - exitStart) / dur, 0, 1);
}
function sceneOpacity(localTime, spriteDur, inDur = 0.45, outDur = 0.45) {
  return fadeIn(localTime, inDur) * fadeOut(localTime, spriteDur, outDur);
}

function PhoneBody({ x, y, scale = 1 }) {
  const { localTime, duration } = useSprite();
  const sc = animate({ from: 0.6, to: 1, start: 0.1, end: 0.7, ease: Easing.easeOutBack })(localTime);
  const op = animate({ from: 0, to: 1, start: 0.1, end: 0.6, ease: Easing.easeOutCubic })(localTime);
  const exitOp = animate({ from: 1, to: 0, start: duration - 0.6, end: duration - 0.1, ease: Easing.easeInCubic })(localTime);
  const W = 140 * scale, H = 260 * scale, R = 22 * scale;
  return (
    <g transform={`translate(${x}, ${y})`} style={{ opacity: op * exitOp }}>
      <g transform={`scale(${sc}) translate(${-W/2}, ${-H/2})`}>

}

function ChatBubble({ x, y, width, text, fromUser, delay, phoneX, phoneY, spriteDur }) {
  const { localTime } = useSprite();
  const t = clamp((localTime - delay) / 0.35, 0, 1);
  const easedT = Easing.easeOutBack(t);
  const exitT = animate({ from: 1, to: 0, start: spriteDur - 0.6, end: spriteDur - 0.15, ease: Easing.easeInCubic })(localTime);
  const op = easedT * exitT;
  const sc = 0.4 + 0.6 * easedT;

  if (localTime < delay) return null;

  const bubbleColor = fromUser ? C.blue : '#1a2e4a';
  const textColor = fromUser ? '#fff' : C.bluePale;

function PaperPlane({ spriteDur }) {
  const { localTime } = useSprite();
  // Plane launches after messages appear, around t=2.0
  const planeT = clamp((localTime - 2.0) / 1.8, 0, 1);
  const easedP = Easing.easeInOutCubic(planeT);
  const exitOp = animate({ from: 1, to: 0, start: spriteDur - 0.5, end: spriteDur, ease: Easing.easeInCubic })(localTime);

  if (localTime < 1.9) return null;

  const startX = 640, startY = 340;
  const endX = 1150, endY = 80;
  const px = startX + (endX - startX) * easedP;
  const py = startY + (endY - startY) * easedP - Math.sin(planeT * Math.PI) * 60;
  const angle = Math.atan2((endY - startY) - 60, endX - startX) * (180 / Math.PI);

  // Trail points
  const trailPoints = [];
  for (let i = 1; i <= 8; i++) {
    const tp = Math.max(0, planeT - i * 0.04);
    const etp = Easing.easeInOutCubic(tp);
    trailPoints.push({
      x: startX + (endX - startX) * etp,
      y: startY + (endY - startY) * etp - Math.sin(tp * Math.PI) * 60,
      op: (1 - i/8) * 0.5,
    });
  }

  return (
    <g style={{ opacity: exitOp }}>
      {/* Trail */}
      {trailPoints.map((pt, i) => (
        <circle key={i} cx={pt.x} cy={pt.y} r={2 - i*0.2}
          fill={C.accent} opacity={pt.op} />
      ))}
      {/* Plane */}
      <g transform={`translate(${px}, ${py}) rotate(${angle})`}>
        <polygon points="-18,0 8,-7 8,7" fill={C.white} />
        <polygon points="-18,0 8,-7 -6,0" fill={C.blueLight} />
        <polygon points="-10,-5 -4,-8 -4,-2" fill={C.accent} opacity={0.7} />
      </g>
    </g>
  );
}

function Coin({ x0, y0, angle, delay, spriteDur }) {
  const { localTime } = useSprite();
  const t = clamp((localTime - delay) / 1.2, 0, 1);
  const exitOp = animate({ from: 1, to: 0, start: spriteDur - 0.55, end: spriteDur - 0.15, ease: Easing.easeInCubic })(localTime);

  if (localTime < delay) return null;

  // Bounce trajectory
  const gravity = 2.5;
  const vy0 = -3.5;
  const vx = Math.cos(angle) * 1.8;
  const rawX = x0 + vx * t * 100;
  const rawY = y0 + (vy0 * t + gravity * t * t) * 100;
  const opacity = t < 0.8 ? 1 : 1 - (t - 0.8) / 0.2;
  const sc = 1 - t * 0.2;

  return (
    <g transform={`translate(${rawX}, ${rawY})`}
      style={{ opacity: opacity * exitOp }}>
      <g transform={`scale(${sc})`}>
        <ellipse cx={0} cy={3} rx={14} ry={5} fill="#b8870022" />
        <circle cx={0} cy={0} r={14} fill={C.gold} />

          fontFamily={FONT_TITLE} fontSize={11} fontWeight={900}
          fill="#8a5e00">
          $
        </text>
      </g>
    </g>
  );
}

function DeliveryTruck({ spriteDur }) {
  const { localTime } = useSprite();
  const exitOp = animate({ from: 1, to: 0, start: spriteDur - 0.6, end: spriteDur - 0.1, ease: Easing.easeInCubic })(localTime);

  // Truck drives from left (-300) to rest position (~750) then slight overshoot
  const driveT = clamp(localTime / 2.4, 0, 1);
  const easedDrive = Easing.easeInOutCubic(driveT);
  const stopT = clamp((localTime - 2.4) / 0.4, 0, 1);
  const overshoot = Easing.easeOutBack(stopT) * 30 - 30;

  const tx = -300 + easedDrive * 1000 + (driveT >= 1 ? overshoot : 0);

  // Wheel spin
  const wheelAngle = localTime * 360 * 0.8;
  // Suspension bounce
  const bounce = driveT < 1 ? Math.sin(localTime * 20) * 2 : 0;

  const TY = 432 + bounce;
  const W = 200, H = 90, cabW = 65;

  return (
    <g transform={`translate(${tx}, ${TY})`} style={{ opacity: exitOp }}>
      {/* Exhaust puff */}
      {driveT < 1 && (
        <g>
          {[0,1,2].map(i => {
            const puffT = (localTime * 3 + i * 0.5) % 1;
            return (
              <circle key={i}
                cx={-W/2 - 10 - puffT * 30}
                cy={-H/2 + 20 - puffT * 15}
                r={4 + puffT * 8}
                fill={C.grayDark}
                opacity={(1 - puffT) * 0.4} />
            );
          })}
        </g>
      )}

      {/* Cargo box */}
      <rect x={-W/2} y={-H} width={W - cabW} height={H}
        fill="#0d2040" stroke={C.blue} strokeWidth={1.5} rx={4} />
      {/* Cargo markings */}
      <text x={-W/2 + (W - cabW)/2} y={-H/2 + 5} textAnchor="middle"
        fontFamily={FONT_TITLE} fontSize={11} fontWeight={800}
        fill={C.accent} letterSpacing="0.1em">
        VALTRAX
      </text>
      <line x1={-W/2+10} y1={-H+18} x2={W/2-cabW-10} y2={-H+18}
        stroke={C.blue} strokeWidth={1} opacity={0.4} />

      {/* Boxes on top */}
      {[0,1,2].map(i => (
        <rect key={i}
          x={-W/2 + 8 + i * 38}
          y={-H - 22}
          width={30} height={22} rx={3}
          fill={C.blue} stroke={C.blueLight} strokeWidth={1}
          opacity={0.8} />
      ))}

      {/* Cab */}
      <rect x={W/2 - cabW} y={-H} width={cabW} height={H}
        fill="#1a3050" stroke={C.blueLight} strokeWidth={1.5} rx={4} />
      {/* Windshield */}
      <rect x={W/2 - cabW + 6} y={-H + 8} width={cabW - 16} height={32} rx={4}
        fill={C.blueLight} opacity={0.25} />
      {/* Headlights */}
      <rect x={W/2 - 6} y={-H + 20} width={8} height={12} rx={2}
        fill={C.gold} opacity={driveT > 0.1 ? 0.8 : 0.2} />

      {/* Wheels */}
      {[-W/2 + 24, W/2 - 26].map((wx, i) => (
        <g key={i} transform={`translate(${wx}, 0)`}>
          <circle cx={0} cy={0} r={22} fill="#071020" stroke={C.grayDark} strokeWidth={2} />
          <circle cx={0} cy={0} r={14} fill="#0d1e30" stroke={C.blue} strokeWidth={1} />
          <g transform={`rotate(${wheelAngle})`}>
            {[0,60,120,180,240,300].map(a => {
              const rad = a * Math.PI / 180;
              return (
                <line key={a}
                  x1={0} y1={0}
                  x2={Math.cos(rad) * 10} y2={Math.sin(rad) * 10}
                  stroke={C.blueLight} strokeWidth={2} opacity={0.5} />
              );
            })}
          </g>
          <circle cx={0} cy={0} r={4} fill={C.blueLight} />
        </g>
      ))}
    </g>
  );
}

function DeliveryBoxes({ spriteDur }) {
  const { localTime } = useSprite();
  const t = clamp((localTime - 2.8) / 0.6, 0, 1);
  const exitOp = animate({ from: 1, to: 0, start: spriteDur - 0.55, end: spriteDur - 0.1, ease: Easing.easeInCubic })(localTime);
  if (localTime < 2.7) return null;

  return (
    <g style={{ opacity: clamp(t*2,0,1) * exitOp }}>
      {[0,1,2].map(i => {
        const dropT = clamp((t - i * 0.12) / 0.5, 0, 1);
        const by = Easing.easeOutBounce ? Easing.easeOutBounce(dropT) : Easing.easeOutCubic(dropT);
        const bY = 448 - by * 30 - i * 26;
        return (
          <rect key={i}
            x={958} y={bY}
            width={34} height={26} rx={4}
            fill={C.blue} stroke={C.blueLight} strokeWidth={1}
            opacity={dropT > 0 ? 1 : 0} />
        );
      })}
    </g>
  );
}

function DeliveryCheck({ spriteDur }) {
  const { localTime } = useSprite();
  const t = clamp((localTime - 3.2) / 0.4, 0, 1);
  const sc = Easing.easeOutElastic(t);
  const exitOp = animate({ from: 1, to: 0, start: spriteDur - 0.55, end: spriteDur - 0.1, ease: Easing.easeInCubic })(localTime);
  if (localTime < 3.1) return null;

  return (
    <g transform={`translate(1000, 320)`}
      style={{ opacity: clamp(t*2,0,1) * exitOp }}>
      <g transform={`scale(${sc})`}>
        <circle cx={0} cy={0} r={28} fill={C.green} />
        <polyline points="-12,0 -3,10 16,-12"
          stroke="white" strokeWidth={4.5} fill="none"
          strokeLinecap="round" strokeLinejoin="round" />
      </g>
    </g>
  );
}

function Scene4() {
  const { localTime, duration } = useSprite();
  const op = sceneOpacity(localTime, duration, 0.5, 0.5);

  // 24h badge
  const badgeOp = clamp((localTime - 1.0)/0.4, 0, 1) * fadeOut(localTime, duration, 0.5);

  return (
    <g style={{ opacity: op }}>
      <Road spriteDur={duration} />
      <DeliveryBuilding spriteDur={duration} />
      <DeliveryTruck spriteDur={duration} />
      <DeliveryBoxes spriteDur={duration} />
      <DeliveryCheck spriteDur={duration} />

      {badgeOp > 0 && (
        <g style={{ opacity: badgeOp }}>
          <rect x={240} y={370} width={160} height={50} rx={25}
            fill={`${C.accent}22`} stroke={C.accent} strokeWidth={1.5} />
          <text x={320} y={390} textAnchor="middle"
            fontFamily={FONT_TITLE} fontSize={13} fontWeight={900}
            fill={C.accent} letterSpacing="0.06em">
            24 HORAS
          </text>
          <text x={320} y={408} textAnchor="middle"
            fontFamily={FONT_BODY} fontSize={11} fill={C.bluePale}>
            entrega garantizada
          </text>
        </g>
      )}
    </g>
  );
}

// ─── BACKGROUND ───────────────────────────────────────────────────────────────
function Background() {
  return (
    <>
      {/* Base gradient */}
      <defs>
        <radialGradient id="bgGrad" cx="50%" cy="45%" r="60%">
          <stop offset="0%" stopColor="#0d1e35" />
          <stop offset="100%" stopColor={C.bg} />
        </radialGradient>
        <radialGradient id="glowGrad" cx="50%" cy="50%" r="50%">
          <stop offset="0%" stopColor={C.blue} stopOpacity="0.08" />
          <stop offset="100%" stopColor={C.blue} stopOpacity="0" />
        </radialGradient>
      </defs>
      <rect x={0} y={0} width={1280} height={720} fill="url(#bgGrad)" />
      <rect x={0} y={0} width={1280} height={720} fill="url(#glowGrad)" />

      {/* Subtle grid */}
      {[...Array(10)].map((_, i) => (
        <line key={`h${i}`}
          x1={0} y1={i * 80} x2={1280} y2={i * 80}
          stroke={C.blueLight} strokeWidth={0.3} opacity={0.04} />
      ))}
      {[...Array(17)].map((_, i) => (
        <line key={`v${i}`}
          x1={i * 80} y1={0} x2={i * 80} y2={720}
          stroke={C.blueLight} strokeWidth={0.3} opacity={0.04} />
      ))}

    </>
  );
}

// ─── VALTRAX LOGO WATERMARK ───────────────────────────────────────────────────
function LogoWatermark() {
  return (
    <g opacity={0.18}>
      <text x={640} y={694} textAnchor="middle"
        fontFamily={FONT_TITLE} fontSize={13} fontWeight={900}
        fill={C.bluePale} letterSpacing="0.28em">
        VALTRAX INDUSTRIAL SPA
      </text>
    </g>
  );
}

// ─── TRANSITION FLASH ─────────────────────────────────────────────────────────
function TransitionFlash({ start, end }) {
  const t = useTime();
  if (t < start || t > end) return null;
  const mid = (start + end) / 2;
  const fadeT = t < mid
    ? clamp((t - start) / (mid - start), 0, 1)
    : 1 - clamp((t - mid) / (end - mid), 0, 1);
  return (
    <rect x={0} y={0} width={1280} height={720}
      fill={C.bg} opacity={Easing.easeInOutSine(fadeT) * 0.85} />
  );
}



// ─── MAIN APP ─────────────────────────────────────────────────────────────────
function App() {
  const t = useTime();
  // Update data-screen-label each second
  const labelRef = React.useRef(null);
  React.useEffect(() => {
    if (labelRef.current) {
      labelRef.current.setAttribute('data-screen-label', `t=${Math.floor(t)}s`);
    }
  });

  return (
    <div ref={labelRef} style={{ width: 1280, height: 720, position: 'relative' }}
      data-screen-label="t=0s">
      <svg width={1280} height={720} style={{ position: 'absolute', inset: 0 }}
        viewBox="0 0 1280 720">
        <Background />

        {/* Step 1: SOLICITAS */}
        <Sprite start={S1_START} end={S1_END}>
          <Scene1 />
        </Sprite>

        {/* Step 2: COTIZAMOS */}
        <Sprite start={S2_START} end={S2_END}>
          <Scene2 />
        </Sprite>

        {/* Step 3: COMPRAMOS */}
        <Sprite start={S3_START} end={S3_END}>
          <Scene3 />
        </Sprite>

        {/* Step 4: ENTREGAMOS */}
        <Sprite start={S4_START} end={S4_END}>
          <Scene4 />
        </Sprite>

        {/* Transition flashes */}
        <TransitionFlash start={T1_START} end={T1_END} />
        <TransitionFlash start={T2_START} end={T2_END} />
        <TransitionFlash start={T3_START} end={T3_END} />

        {/* Logo */}
        <LogoWatermark />
      </svg>

      {/* Step labels (HTML overlay for crisp text) */}

      <Sprite start={S1_START} end={S1_END}>
        <StepLabel number={1} title="SOLICITAS"
          description="Nos dices qué necesitas por WhatsApp, formulario o teléfono."
          x={640} y={510} />
      </Sprite>

      <Sprite start={S2_START} end={S2_END}>
        <StepLabel number={2} title="COTIZAMOS"
          description="Comparamos precios y te enviamos la mejor opción en menos de 2 horas."
          x={640} y={510} />
      </Sprite>

      <Sprite start={S3_START} end={S3_END}>
        <StepLabel number={3} title="COMPRAMOS"
          description="Gestionamos la compra con nuestros proveedores por ti."
          x={640} y={510} />
      </Sprite>

      <Sprite start={S4_START} end={S4_END}>
        <StepLabel number={4} title="ENTREGAMOS"
          description="Tu pedido llega en 24 horas directo a tu faena u oficina."
          x={640} y={510} />
      </Sprite>

      {/* Step dots */}
      <ActiveStepIndicator />
    </div>
  );
}

// The StepLabel wrapper needs to use transform on a div
function StepLabel({ number, title, description, x, y }) {
  const { localTime, duration } = useSprite();
  const op = sceneOpacity(localTime, duration, 0.5, 0.4);
  const ty = animate({ from: 18, to: 0, start: 0, end: 0.5, ease: Easing.easeOutCubic })(localTime);
  return (
    <div style={{
      position: 'absolute',
      left: 0, top: 0,
      width: 1280, height: 720,
      display: 'flex',
      flexDirection: 'column',
      alignItems: 'center',
      justifyContent: 'flex-end',
      paddingBottom: 110,
      opacity: op,
      transform: `translateY(${ty}px)`,
      pointerEvents: 'none',
    }}>
      <div style={{
        fontFamily: FONT_TITLE, fontSize: 13, fontWeight: 700,
        color: C.accent, letterSpacing: '0.18em', textTransform: 'uppercase',
        marginBottom: 4, whiteSpace: 'nowrap',
      }}>
        {`PASO ${number}`}
      </div>
      <div style={{
        fontFamily: FONT_TITLE, fontSize: 56, fontWeight: 900,
        color: C.white, letterSpacing: '0.06em', textTransform: 'uppercase',
        lineHeight: 1,
        textShadow: `0 0 50px ${C.blueLight}55`,
      }}>
        {title}
      </div>
      <div style={{
        fontFamily: FONT_BODY, fontSize: 17, fontWeight: 400,
        color: C.gray, marginTop: 10,
        maxWidth: 400, textAlign: 'center', lineHeight: 1.5,
      }}>
        {description}
      </div>
    </div>
  );
}

function ActiveStepIndicator() {
  const rawT = useTime();
  const t = ((rawT % TOTAL) + TOTAL) % TOTAL;
  let step = 1;
  if (t >= S2_START) step = 2;
  if (t >= S3_START) step = 3;
  if (t >= S4_START) step = 4;
  return (
    <div style={{
      position: 'absolute', top: 30, left: 0, width: 1280,
      display: 'flex', justifyContent: 'center', gap: 10,
      pointerEvents: 'none',
    }}>
      {[1,2,3,4].map(n => {
        const isActive = n === step;
        const isDone = n < step;
        return (
          <div key={n} style={{
            width: isActive ? 32 : 8,
            height: 8,
            borderRadius: 4,
            background: isActive ? C.accent : isDone ? C.blueLight : C.grayDark,
            opacity: isActive ? 1 : 0.55,
            transition: 'width 0.35s ease, background 0.35s ease',
          }} />
        );
      })}
    </div>
  );
}

// Clear any stale persisted time so animation always starts from 0
try { localStorage.removeItem('valtrax-anim:t'); } catch {}

ReactDOM.createRoot(document.getElementById('root')).render(
  <Stage width={1280} height={720} duration={TOTAL} background={C.bg}
    loop={true} autoplay={true} persistKey="valtrax-anim">
    <App />
  </Stage>
);
</script>
</body>
</html>
